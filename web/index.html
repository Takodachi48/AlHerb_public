<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/herb-icon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="%APP_DESCRIPTION% - %SYSTEM_NAME%" />
    <meta name="keywords" content="%APP_KEYWORDS%" />
    <meta name="author" content="%APP_AUTHOR%" />
    
    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="%APP_URL%" />
    <meta property="og:title" content="%SYSTEM_NAME%" />
    <meta property="og:description" content="%APP_DESCRIPTION%" />
    <meta property="og:image" content="/herb-icon.svg" />

    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image" />
    <meta property="twitter:url" content="%APP_URL%" />
    <meta property="twitter:title" content="%SYSTEM_NAME%" />
    <meta property="twitter:description" content="%APP_DESCRIPTION%" />
    <meta property="twitter:image" content="/herb-icon.svg" />

    <!-- Preconnect to external domains -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:wght@400;500;600;700&display=swap" rel="stylesheet" />
    
    <title>%SYSTEM_NAME%</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
